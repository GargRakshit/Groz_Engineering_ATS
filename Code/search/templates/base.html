<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Application Tracking System{% endblock %}</title>
  <script>(function(){var t=localStorage.getItem('rp-theme')||'light';document.documentElement.setAttribute('data-theme',t);})()</script>
  <style>
    :root {
      --bg:          #f7f2ea;
      --surface:     #ffffff;
      --surface-alt: #fffaf3;
      --border:      #eadfd4;
      --border-sub:  #f3e8dc;
      --text-1:      #1b1b1b;
      --text-2:      #5f5a55;
      --text-3:      #8a8278;
      --accent:      #ff7a18;
      --accent-h:    #e25f00;
      --accent-soft: #fff0e0;
      --nav-bg:      #111111;
      --nav-text:    #f7f3ee;
      --input-bg:    #ffffff;
      --input-border:#d8c9ba;
      --card-shadow: 0 12px 30px rgba(17,17,17,.08);
      --badge-ok-bg:    #fff0e0; --badge-ok-text:   #9a4700;
      --badge-fail-bg:  #f8d7d7; --badge-fail-text: #8f1f1f;
      --badge-na-bg:    #f1ebe3; --badge-na-text:   #6b635b;
      --pill-bg:        #f3ece4; --pill-text:       #645d55;
      --pill-match-bg:  #fff0e0; --pill-match-text: #9a4700;
      --pill-miss-bg:   #f8d7d7; --pill-miss-text:  #8f1f1f;
    }
    [data-theme="dark"] {
      --bg:          #141414;
      --surface:     #1c1c1c;
      --surface-alt: #202020;
      --border:      #3a332d;
      --border-sub:  #2d2722;
      --text-1:      #f2ede7;
      --text-2:      #c0b6ac;
      --text-3:      #91867c;
      --accent:      #ff8b21;
      --accent-h:    #d86a11;
      --accent-soft: #2a2019;
      --nav-bg:      #151515;
      --nav-text:    #f2ede7;
      --input-bg:    #1b1b1b;
      --input-border:#433b34;
      --card-shadow: 0 12px 28px rgba(0,0,0,.26);
      --badge-ok-bg:    #2a2019; --badge-ok-text:   #ffb46c;
      --badge-fail-bg:  #36201c; --badge-fail-text: #ff9e9e;
      --badge-na-bg:    #202020; --badge-na-text:   #b0a59b;
      --pill-bg:        #202020; --pill-text:       #bcb0a5;
      --pill-match-bg:  #2a2019; --pill-match-text: #ffb46c;
      --pill-miss-bg:   #36201c; --pill-miss-text:  #ff9e9e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      font-size: 15px;
      background-image:
        radial-gradient(circle at top left, rgba(255,122,24,.10), transparent 28%),
        radial-gradient(circle at bottom right, rgba(0,0,0,.08), transparent 34%);
    }

    nav {
      background: var(--nav-bg);
      color: var(--nav-text);
      padding: 0 1.5rem;
      min-height: 58px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid rgba(255,122,24,.18);
    }
    .nav-brand-logo {
      display: flex;
      align-items: center;
      padding: 0.18rem 0.18rem;
      border-radius: 10px;
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(255,122,24,.22);
      box-shadow: 0 6px 18px rgba(0,0,0,.18);
      flex-shrink: 0;
    }
    .nav-brand-logo img,
    .nav-brand-logo svg { display: block; width: 120px; height: auto; }
    .nav-brand-logo .brand-dark { display: none; }
    [data-theme="dark"] .nav-brand-logo {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
    }
    [data-theme="dark"] .nav-brand-logo .brand-light { display: none; }
    [data-theme="dark"] .nav-brand-logo .brand-dark { display: block; }
    .brand {
      color: var(--nav-text);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
      margin-right: 0.25rem;
    }
    .breadcrumb {
      color: var(--text-2);
      font-size: 0.83rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex: 1;
    }
    .breadcrumb a { color: #74c0fc; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    .nav-spacer { flex: 1; }

    .nav-logout {
      color: rgba(255,255,255,0.72);
      font-size: 0.8rem;
      text-decoration: none;
      padding: 0.25rem 0.6rem;
      border: 1px solid rgba(255,122,24,0.28);
      border-radius: 6px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      margin-right: 0.4rem;
      background: rgba(255,255,255,0.03);
    }
    .nav-logout:hover { background: rgba(255,122,24,0.14); color: #fff; border-color: rgba(255,122,24,0.5); }

    .theme-btn {
      width: 30px; height: 30px;
      border-radius: 6px;
      border: 1px solid rgba(255,122,24,0.28);
      background: rgba(255,122,24,0.08);
      color: var(--nav-text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .theme-btn:hover { background: rgba(255,122,24,0.18); border-color: rgba(255,122,24,.45); }
    .icon-moon { display: flex; }
    .icon-sun  { display: none; }
    [data-theme="dark"] .icon-moon { display: none; }
    [data-theme="dark"] .icon-sun  { display: flex; }

    main { max-width: 1100px; margin: 1.75rem auto; padding: 0 1.25rem; }

    .card {
      background: var(--surface);
      border-radius: 10px;
      padding: 1.6rem;
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border);
    }

    /* Form */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-wide { grid-column: 1 / -1; }
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field label {
      font-size: 0.7rem; font-weight: 700; color: var(--text-2);
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    .field input, .field select {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--input-border);
      border-radius: 7px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text-1);
      background: var(--input-bg);
    }
    .field input:focus, .field select:focus {
      outline: 2px solid var(--accent);
      border-color: transparent;
    }
    .btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-h)); color: #111; border: none;
      padding: 0.55rem 1.6rem; border-radius: 7px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.92; }
    .btn-sm {
      padding: 0.32rem 0.85rem; font-size: 0.79rem;
      background: var(--surface); color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: 6px; text-decoration: none; display: inline-block;
      font-family: inherit; cursor: pointer; transition: background 0.12s;
    }
    .btn-sm:hover { background: var(--border); color: var(--text-1); }

    /* Badges */
    .badge {
      display: inline-block; font-size: 0.69rem; border-radius: 4px;
      padding: 0.15rem 0.45rem; font-weight: 700; letter-spacing: 0.02em;
    }
    .badge-ok   { background: var(--badge-ok-bg);   color: var(--badge-ok-text); }
    .badge-fail { background: var(--badge-fail-bg); color: var(--badge-fail-text); }
    .badge-na   { background: var(--badge-na-bg);   color: var(--badge-na-text); }

    /* Pills */
    .pills { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .pill {
      display: inline-block; font-size: 0.74rem;
      padding: 0.2rem 0.6rem; border-radius: 20px;
      background: var(--pill-bg); color: var(--pill-text);
    }
    .pill-matched { background: var(--pill-match-bg); color: var(--pill-match-text); font-weight: 500; }
    .pill-missing { background: var(--pill-miss-bg);  color: var(--pill-miss-text);  font-weight: 500; }

    /* Detail page */
    .cand-header { margin-bottom: 0; }
    .cand-name { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text-1); }
    .cand-meta {
      margin-top: 0.6rem; font-size: 0.87rem; color: var(--text-2);
      display: flex; flex-wrap: wrap; gap: 0.5rem 1.1rem; align-items: center;
    }
    .cand-meta a { color: var(--accent); text-decoration: none; }
    .cand-meta a:hover { text-decoration: underline; }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1rem;
    }
    .score-item label {
      font-size: 0.68rem; color: var(--text-3); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      display: block; margin-bottom: 0.25rem;
    }
    .score-item .val { font-size: 1rem; font-weight: 700; color: var(--text-1); }

    .section { margin-top: 1rem; }
    .section h2 {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-3); margin-bottom: 1rem;
    }

    .exp-entry + .exp-entry { margin-top: 1.2rem; padding-top: 1.2rem; border-top: 1px solid var(--border-sub); }
    .exp-role    { font-weight: 700; font-size: 0.94rem; color: var(--text-1); }
    .exp-company { color: var(--text-2); font-size: 0.88rem; }
    .exp-dates   { font-size: 0.78rem; color: var(--text-3); margin-top: 0.15rem; }
    .exp-desc    { margin-top: 0.45rem; padding-left: 1.1rem; }
    .exp-desc li { font-size: 0.84rem; color: var(--text-2); margin-bottom: 0.2rem; line-height: 1.45; }

    .edu-entry + .edu-entry { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-sub); }
    .edu-degree { font-weight: 700; font-size: 0.94rem; color: var(--text-1); }
    .edu-inst   { color: var(--text-2); font-size: 0.87rem; }
    .edu-dates  { font-size: 0.78rem; color: var(--text-3); margin-top: 0.15rem; }

    .summary-text { font-size: 0.89rem; color: var(--text-2); line-height: 1.65; }

    .certs-list { list-style: disc; padding-left: 1.2rem; }
    .certs-list li { font-size: 0.87rem; color: var(--text-2); margin-bottom: 0.25rem; }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    @media (max-width: 700px) {
      .form-grid, .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand-logo" aria-label="Groz Engineering">
      <img class="brand-light" src="/images/MicrosoftTeams-image.png" alt="Groz Engineering logo">
      <svg class="brand-dark" viewBox="0 0 520 140" role="img" aria-label="GROZ">
        <defs>
          <linearGradient id="groz-stroke-base" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#ff9b36" />
            <stop offset="100%" stop-color="#ff6d00" />
          </linearGradient>
        </defs>
        <g transform="translate(28,28)">
          <path d="M38 8L16 30l22 22h18L34 30l22-22H38Z" fill="none" stroke="url(#groz-stroke-base)" stroke-width="8" stroke-linejoin="round"/>
          <text x="84" y="56" fill="#f2ede7" stroke="url(#groz-stroke-base)" stroke-width="3.5" paint-order="stroke fill" font-size="52" font-weight="800" font-family="Arial, Helvetica, sans-serif" letter-spacing="1.5">GROZ</text>
        </g>
      </svg>
    </div>
    <a href="/" class="brand">Application Tracking System</a>
    {% block breadcrumb %}{% endblock %}
    <span class="nav-spacer"></span>
    <a href="/logout" class="nav-logout">Sign out</a>
    <button class="theme-btn" onclick="(function(){var h=document.documentElement,n=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('rp-theme',n);})()" title="Toggle theme" aria-label="Toggle dark mode">
      <span class="icon-moon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </span>
      <span class="icon-sun">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </span>
    </button>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
